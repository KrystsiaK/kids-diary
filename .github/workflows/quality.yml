name: Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: kids_diary_quality
          POSTGRES_USER: quality
          POSTGRES_PASSWORD: quality
        options: >-
          --health-cmd pg_isready
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql://quality:quality@localhost:5432/kids_diary_quality
      AUTH_SECRET: quality-secret-placeholder-do-not-use-in-production
      ADMIN_PASSWORD: quality-placeholder
      ANTHROPIC_API_KEY: quality-placeholder
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run quality gate
        run: npm run test:all
