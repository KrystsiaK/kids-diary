name: Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: kids_diary_quality
          POSTGRES_USER: quality
          POSTGRES_PASSWORD: quality
        options: >-
          --health-cmd pg_isready
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql://quality:quality@localhost:5432/kids_diary_quality
      AUTH_SECRET: quality-secret-placeholder-do-not-use-in-production
      ADMIN_PASSWORD: quality-placeholder
      ANTHROPIC_API_KEY: quality-placeholder
      ENABLE_SEED_CONTENT: "true"
      NEXT_TELEMETRY_DISABLED: 1
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Unit and integration coverage
        run: npm run test:coverage

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v8
        with:
          args: >
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}

      - name: Build
        run: npm run build

      - name: E2E
        run: npm run test:e2e
