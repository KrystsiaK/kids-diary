services:
  database:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: kids_diary
      POSTGRES_USER: kids_diary
      POSTGRES_PASSWORD: kids_diary
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kids_diary -d kids_diary"]
      interval: 2s
      timeout: 5s
      retries: 15
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      DATABASE_URL: postgresql://kids_diary:kids_diary@database:5432/kids_diary?schema=public
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      AUTH_SECRET: ${AUTH_SECRET:-local-docker-auth-secret-change-me}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      FILE_STORAGE_MODE: local
      UPLOADS_SUBDIR: uploads
      ENABLE_SEED_CONTENT: "true"
    ports:
      - "3000:3000"
    volumes:
      - uploads:/app/public/uploads
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  uploads:
